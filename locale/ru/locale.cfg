[item-name]
configurable-valve=Настраиваемый клапан

[entity-name]
configurable-valve=Настраиваемый клапан

[entity-description]
configurable-valve=Клапан, который можно настроить как перепускной, дозирующий или односторонний с пользовательскими порогами с использованием условий цепи. Уровни входа ([img=virtual-signal/signal-I]) и выхода ([img=virtual-signal/signal-O]) всегда отображаются в процентах.

[configurable-valves]
valve-examples=\n\n[font=default-bold]Примеры использования:[/font]\nПерепускной клапан: [img=virtual-signal/signal-I] > 80\nДозирующий клапан: [img=virtual-signal/signal-O] < 80\nОдносторонний клапан: [img=virtual-signal/signal-I] > [img=virtual-signal/signal-O]
valve-shortcuts=\n\n[font=default-bold]Горячие клавиши:[/font]\n__CONTROL__configurable-valves-switch__ переключение между типами клапанов.\n__CONTROL__configurable-valves-plus__ увеличить порог\n__CONTROL__configurable-valves-minus__ уменьшить порог
more-in-factoriopedia=Подробнее в Факторипедии.
unknown-configuration=Неизвестная конфигурация
configuration-doesnt-support-thresholds=Конфигурация не поддерживает пороги
overflow=Переполнение
top_up=Дозирование
one_way=Односторонний

[controls]
configurable-valves-switch=Переключение между типами клапанов
configurable-valves-plus=Увеличить порог клапана
configurable-valves-minus=Уменьшить порог клапана

[controls-description]
configurable-valves-switch=Позволяет циклически переключаться между тремя основными режимами клапана: перепускной, дозирующий и односторонний.
configurable-valves-plus=Регулирует порог для перепускных или дозирующих клапанов.
configurable-valves-minus=Регулирует порог для перепускных или дозирующих клапанов.

[mod-setting-name]
configurable-valve-pump-speed=Скорость прокачки клапана
configurable-valve-disable-py-migration=Отключить миграцию: PyIndustry

[mod-setting-description]
configurable-valve-pump-speed=Количество жидкости, прокачиваемое насосом каждую секунду, когда клапан открыт. Будет ограничено максимальным потоком жидкости, заданным в утилите `max_fluid_flow`.
configurable-valve-disable-py-migration=Отключена автоматическая миграция клапанов PyIndustry в этот мод.
